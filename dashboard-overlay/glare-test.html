<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ambient Glare Test — K10 Media Broadcaster</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #eee;
    font-family: system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* "Game" canvas fills background */
  #gameCanvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
  }

  /* WebGL glare canvas — ON TOP of panels */
  #glareCanvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 150;
    pointer-events: none;
  }

  /* Mock dashboard panels */
  .panels {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }
  .panel {
    background: hsla(0, 0%, 8%, 0.88);
    border: 1px solid hsla(0, 0%, 100%, 0.06);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    backdrop-filter: blur(4px);
    min-width: 100px;
  }
  .panel h3 { font-size: 10px; color: hsla(0,0%,100%,0.4); text-transform: uppercase; letter-spacing: 0.06em; }
  .panel .val { font-size: 22px; font-weight: 900; }

  /* Left side panels */
  .panels-left {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }

  /* Bottom bar panel */
  .panel-bottom {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    pointer-events: none;
  }
  .panel-bottom .panel {
    min-width: 280px;
  }

  /* Status HUD */
  .status-hud {
    position: fixed;
    bottom: 10px;
    right: 10px;
    z-index: 200;
    background: rgba(0,0,0,0.85);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
    min-width: 260px;
  }
  .status-hud .swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    vertical-align: middle;
    margin-right: 6px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .status-hud .dim { color: rgba(255,255,255,0.4); }

  /* Controls */
  .controls {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: rgba(0,0,0,0.9);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: auto;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .controls label { display: flex; align-items: center; gap: 6px; color: #aaa; font-size: 11px; }
  .controls input[type="range"] { width: 80px; }
  .controls button {
    background: hsla(215, 80%, 55%, 0.25);
    color: hsl(215, 80%, 75%);
    border: 1px solid hsla(215, 80%, 55%, 0.5);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- "Game" background canvas -->
<canvas id="gameCanvas"></canvas>

<!-- WebGL glare canvas — z-index ABOVE panels -->
<canvas id="glareCanvas"></canvas>

<!-- Mock dashboard panels — scattered to test masking from multiple positions -->
<div class="panels">
  <div class="panel" id="p1"><h3>BB</h3><div class="val" style="color:hsl(355,80%,65%)">56.2</div></div>
  <div class="panel" id="p2"><h3>TC</h3><div class="val" style="color:hsl(215,80%,68%)">4</div></div>
  <div class="panel" id="p3"><h3>ABS</h3><div class="val" style="color:hsl(48,85%,62%)">active</div></div>
  <div class="panel" id="p4"><h3>GAP</h3><div class="val">+1.24s</div></div>
</div>

<div class="panels-left">
  <div class="panel" id="p5"><h3>SPEED</h3><div class="val" style="color:hsl(0,0%,95%)">187</div></div>
  <div class="panel" id="p6" style="opacity:0.5"><h3>FUEL</h3><div class="val" style="color:hsl(130,60%,55%)">32L</div></div>
</div>

<div class="panel-bottom">
  <div class="panel" id="p7"><h3>LAP TIME</h3><div class="val" style="color:hsl(45,90%,65%)">1:42.387</div></div>
</div>

<!-- Controls -->
<div class="controls" id="ctrlBox">
  <strong style="color:#fff;font-size:12px;">Glare Test</strong>
  <label>Opacity<input type="range" id="opSlider" min="0" max="100" value="50"></label>
  <label>Lum<input type="range" id="lumSlider" min="0" max="100" value="60"></label>
  <button onclick="document.getElementById('ctrlBox').style.display='none'">Hide</button>
</div>

<div class="status-hud" id="statusHud">
  <span class="swatch" id="swatchEl"></span>
  <span id="rgbText">RGB(0, 0, 0)</span><br>
  <span class="dim" id="statusText">Initializing...</span>
</div>

<script>
(function() {
  'use strict';

  // ══════════════════════════════════════════════
  //  "GAME" BACKGROUND — dark animated scene
  // ══════════════════════════════════════════════
  const gameCanvas = document.getElementById('gameCanvas');
  const gameCtx = gameCanvas.getContext('2d');

  function drawGame(ts) {
    const w = gameCanvas.width = window.innerWidth;
    const h = gameCanvas.height = window.innerHeight;
    const t = ts * 0.001;

    // Dark racing-style background
    const grad = gameCtx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, w * 0.7);
    grad.addColorStop(0, '#111');
    grad.addColorStop(1, '#000');
    gameCtx.fillStyle = grad;
    gameCtx.fillRect(0, 0, w, h);

    // Subtle track lines
    gameCtx.strokeStyle = 'rgba(255,255,255,0.03)';
    gameCtx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const y = h * 0.3 + i * 40;
      gameCtx.beginPath();
      gameCtx.moveTo(0, y + Math.sin(t + i) * 10);
      gameCtx.lineTo(w, y + Math.cos(t + i * 0.7) * 10);
      gameCtx.stroke();
    }
  }

  // ══════════════════════════════════════════════
  //  STATIC BLUE AMBIENT COLOR (simulates Electron capture)
  // ══════════════════════════════════════════════
  const BLUE = { r: 0.15, g: 0.30, b: 0.85 };
  const BLUE_LUM = 0.2126 * BLUE.r + 0.7152 * BLUE.g + 0.0722 * BLUE.b;

  // ══════════════════════════════════════════════
  //  WebGL POST-FX ENGINE (mirrors webgl.js exactly)
  // ══════════════════════════════════════════════
  const glareCanvas = document.getElementById('glareCanvas');
  const gl = glareCanvas.getContext('webgl2', { alpha: true, premultipliedAlpha: true, antialias: false });

  function mkShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  const quadVS = `#version 300 es
    in vec2 aPos;
    out vec2 vUV;
    void main() {
      vUV = aPos * 0.5 + 0.5;
      gl_Position = vec4(aPos, 0.0, 1.0);
    }`;

  // ── Full postfx fragment shader (from webgl.js) ──
  const postfxFS = `#version 300 es
    precision highp float;
    in vec2 vUV;
    out vec4 fragColor;

    // Panel glow sources (pedals, etc.)
    uniform float uTime;
    uniform vec4  uRect[8];
    uniform vec4  uColor[8];
    uniform int   uCount;

    // Panel mask rects
    uniform vec4  uPanelRect[16];
    uniform float uPanelAlpha[16];
    uniform int   uPanelCount;
    // Panel border radius in UV space
    uniform vec2  uPanelRadius[16];

    // Telemetry
    uniform float uSpeed;
    uniform float uRpm;
    uniform float uLatG;
    uniform float uLongG;
    uniform float uBrakeHeat;
    uniform float uYawRate;
    uniform float uSteer;

    // Ambient light
    uniform vec3  uAmbientColor;
    uniform float uAmbientLum;

    // ── Rounded-rect SDF for a single panel ──
    // Returns signed distance: negative inside, positive outside
    float roundedRectSDF(vec2 uv, vec4 rect, vec2 radius) {
      vec2 center = rect.xy + rect.zw * 0.5;
      vec2 halfSize = rect.zw * 0.5;
      vec2 d = abs(uv - center) - halfSize + radius;
      return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - min(radius.x, radius.y);
    }

    // ── Panel mask: 0.0 outside, panel opacity inside, with rounded corners ──
    float panelMask(vec2 uv) {
      float mask = 0.0;
      for (int i = 0; i < 16; i++) {
        if (i >= uPanelCount) break;
        vec4 r = uPanelRect[i];
        vec2 rad = uPanelRadius[i];

        float sdf = roundedRectSDF(uv, r, rad);
        // Soft feathered edge — smoothstep from outside to inside
        float m = 1.0 - smoothstep(-0.004, 0.004, sdf);
        m *= uPanelAlpha[i];
        mask = max(mask, m);
      }
      return mask;
    }

    float pulse(float t, float speed, float base) {
      return base + (1.0 - base) * (0.5 + 0.5 * sin(t * speed * 0.6));
    }

    // ── Steer-rotated UV helper ──
    // Rotates UV around a center point by -uSteer (inverted: glare moves
    // opposite the wheel).  ±1 → ∓0.25 rad ≈ ∓14°.
    vec2 steerRotateUV(vec2 uv, vec2 center) {
      float a = -uSteer * 0.25;
      float cs = cos(a), sn = sin(a);
      vec2 d = uv - center;
      return vec2(d.x * cs - d.y * sn, d.x * sn + d.y * cs) + center;
    }

    // ── AMBIENT GLOW — single centered radial, panel-masked ──
    vec4 ambientGlow(vec2 uv) {
      if (uAmbientLum < 0.01) return vec4(0.0);

      // Speed scales all movement: idle ×0.3, full speed ×2.0
      float spdMul = 0.3 + uSpeed * 1.7;

      vec2 center = vec2(0.5, 0.45);
      float dist = length(uv - center);
      float glow = exp(-dist * dist * 1.8) * 2.0;

      // Bloom pulse
      float bloom = 0.8 + 0.2 * sin(uTime * 1.5 * spdMul);
      glow *= bloom;

      // Steer-rotated UV for sweep & shimmer (inverted — glare opposes wheel)
      vec2 rUV = steerRotateUV(uv, center);

      // Light sweep
      float sweep = sin(rUV.x * 2.0 + rUV.y * 1.3 - uTime * 0.8 * spdMul) * 0.5 + 0.5;
      sweep = pow(sweep, 3.0) * 0.7;

      // Shimmer
      float shimmer = sin(rUV.x * 12.0 + uTime * 2.5 * spdMul)
                    * sin(rUV.y * 9.0 - uTime * 1.8 * spdMul) * 0.5 + 0.5;
      shimmer = pow(shimmer, 4.0) * 0.4;

      // Edge bloom near panel boundaries
      float edgeDist = panelMask(uv);
      float edgeBloom = (1.0 - edgeDist) * smoothstep(0.0, 0.5, edgeDist) * 1.5;

      float total = (glow + sweep + shimmer + edgeBloom) * uAmbientLum;
      total = min(total, 2.5);

      vec3 col = uAmbientColor * total;
      float alpha = total * 0.8;
      return vec4(col, clamp(alpha, 0.0, 1.0));
    }

    // EFFECT 1: Panel glow — top-edge reflective source
    vec4 panelGlow(vec2 uv) {
      vec3 col = vec3(0.0);
      float alpha = 0.0;
      for (int i = 0; i < 8; i++) {
        if (i >= uCount) break;
        vec4 rect = uRect[i];
        vec4 clr  = uColor[i];
        float inten = clr.a;
        if (inten < 0.01) continue;

        vec2 src = vec2(rect.x + rect.z * 0.5, rect.y + rect.w * 0.20);

        // Steer-rotate UV around panel center so light tilts opposite the wheel
        vec2 panelCenter = rect.xy + rect.zw * 0.5;
        vec2 sUV = steerRotateUV(uv, panelCenter);

        vec2 delta = sUV - src;
        delta.x /= max(rect.z * 0.7, 0.01);
        delta.y /= max(rect.w * 0.5, 0.01);
        float dist = length(delta);

        float downBias = smoothstep(rect.y, rect.y + rect.w, sUV.y);
        float spread = 3.0;
        float glow = exp(-dist * dist * spread) * inten;
        glow *= mix(1.0, 0.3, downBias);

        float p = pulse(uTime, 3.5 + inten * 2.0, 0.88);
        glow *= p;

        col += clr.rgb * glow * 0.9;
        alpha += glow * 0.4;
      }
      return vec4(col, clamp(alpha, 0.0, 0.70));
    }

    // EFFECT 2: G-force vignette
    vec4 gForceVignette(vec2 uv) {
      float totalG = length(vec2(uLatG, uLongG));
      if (totalG < 0.3) return vec4(0.0);
      float gIntensity = smoothstep(0.3, 3.0, totalG);
      vec2 center = vec2(0.5);
      float dist = length(uv - center) * 1.4;
      float vig = smoothstep(0.3, 1.0, dist);
      vec2 bias = vec2(-uLatG * 0.15, uLongG * 0.12);
      float biasedDist = length(uv - center + bias) * 1.4;
      float biasedVig = smoothstep(0.25, 1.0, biasedDist);
      float finalVig = max(vig, biasedVig) * gIntensity * 0.35;
      vec3 tint = mix(
        vec3(0.02, 0.03, 0.06),
        vec3(0.06, 0.02, 0.01),
        smoothstep(0.0, 1.5, abs(uLongG))
      );
      return vec4(tint, finalVig);
    }

    // EFFECT 3: Speed chromatic aberration
    vec4 speedAberration(vec2 uv) {
      if (uSpeed < 0.3) return vec4(0.0);
      float intensity = smoothstep(0.3, 0.95, uSpeed) * 0.20;
      vec2 center = vec2(0.5);
      vec2 sUV = steerRotateUV(uv, center);
      vec2 dir = sUV - center;
      float dist = length(dir);
      float edgeMask = smoothstep(0.3, 0.8, dist);
      float angle = atan(dir.y, dir.x);
      float streak = pow(abs(sin(angle * 40.0 + uTime * 2.0)), 16.0);
      streak += pow(abs(sin(angle * 25.0 - uTime * 1.3)), 12.0) * 0.5;
      float t = fract(angle / 6.2832 + 0.5);
      vec3 col = mix(
        vec3(0.15, 0.20, 0.60),
        vec3(0.50, 0.10, 0.15),
        t * 0.5 + 0.25
      );
      float alpha = streak * edgeMask * intensity;
      return vec4(col * alpha, alpha * 0.6);
    }

    // EFFECT 4: Brake heat wash
    vec4 brakeHeatWash(vec2 uv) {
      if (uBrakeHeat < 0.05) return vec4(0.0);
      float heat = smoothstep(0.05, 0.8, uBrakeHeat);
      float rise = 1.0 - uv.y;
      rise = pow(rise, 2.0);
      float hSpread = smoothstep(0.5, 0.0, abs(uv.x - 0.5) - heat * 0.3);
      float shimmer = 0.85 + 0.15 * sin(uTime * 8.0 + uv.x * 20.0)
                                   * sin(uTime * 6.0 + uv.y * 15.0);
      float mask = rise * hSpread * heat * shimmer;
      vec3 col = mix(
        vec3(0.90, 0.25, 0.05),
        vec3(1.00, 0.55, 0.10),
        rise * 0.6
      );
      float alpha = mask * 0.25;
      return vec4(col * alpha, alpha);
    }

    // EFFECT 5: RPM redline pulse
    vec4 rpmRedlinePulse(vec2 uv) {
      if (uRpm < 0.88) return vec4(0.0);
      float rpmIntensity = smoothstep(0.88, 0.98, uRpm);
      float strobe = 1.0;
      if (uRpm > 0.95) {
        strobe = 0.6 + 0.4 * abs(sin(uTime * 18.0));
      }
      float edgeDist = min(min(uv.x, 1.0 - uv.x), min(uv.y, 1.0 - uv.y));
      float edgeGlow = exp(-edgeDist * 30.0);
      float alpha = edgeGlow * rpmIntensity * strobe * 0.40;
      vec3 col = vec3(0.95, 0.10, 0.05);
      return vec4(col * alpha, alpha);
    }

    void main() {
      vec2 uv = vUV;
      uv.y = 1.0 - uv.y;

      // Panel mask with rounded corners
      float mask = panelMask(uv);
      if (mask < 0.001) { fragColor = vec4(0.0); return; }

      // Layer all effects
      vec4 ambient  = ambientGlow(uv);
      vec4 glow     = panelGlow(uv);
      vec4 vignette = gForceVignette(uv);
      vec4 aberr    = speedAberration(uv);
      vec4 heat     = brakeHeatWash(uv);
      vec4 redline  = rpmRedlinePulse(uv);

      // Additive composite
      vec3 col = vec3(0.0);
      float alpha = 0.0;

      col += ambient.rgb;
      alpha += ambient.a;

      col += glow.rgb;
      alpha += glow.a;

      col = mix(col, col - vignette.rgb, vignette.a);
      alpha = max(alpha, vignette.a * 0.5);

      col += aberr.rgb;
      alpha += aberr.a;

      col += heat.rgb;
      alpha += heat.a;

      col += redline.rgb;
      alpha += redline.a;

      alpha = clamp(alpha, 0.0, 0.80);
      col = clamp(col, 0.0, 1.0);

      // Circular gradient mask — full intensity at center, 5% at screen edges
      float edgeRadius = length(uv - vec2(0.5)) / 0.7071; // 0 at center, 1 at corners
      float radialFade = mix(1.0, 0.05, smoothstep(0.0, 1.0, edgeRadius));
      alpha *= radialFade;

      // Apply panel mask (rounded, opacity-aware)
      alpha *= mask;
      fragColor = vec4(col * alpha, alpha);
    }`;

  const vs = mkShader(gl.VERTEX_SHADER, quadVS);
  const fs = mkShader(gl.FRAGMENT_SHADER, postfxFS);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }

  // Attributes
  const aPos = gl.getAttribLocation(prog, 'aPos');
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

  // Uniforms
  const uTime  = gl.getUniformLocation(prog, 'uTime');
  const uCount = gl.getUniformLocation(prog, 'uCount');
  const uRect = [], uColor = [];
  for (let i = 0; i < 8; i++) {
    uRect[i]  = gl.getUniformLocation(prog, 'uRect[' + i + ']');
    uColor[i] = gl.getUniformLocation(prog, 'uColor[' + i + ']');
  }
  const uPanelCount = gl.getUniformLocation(prog, 'uPanelCount');
  const uPanelRect = [], uPanelAlpha = [], uPanelRadius = [];
  for (let i = 0; i < 16; i++) {
    uPanelRect[i]   = gl.getUniformLocation(prog, 'uPanelRect[' + i + ']');
    uPanelAlpha[i]  = gl.getUniformLocation(prog, 'uPanelAlpha[' + i + ']');
    uPanelRadius[i] = gl.getUniformLocation(prog, 'uPanelRadius[' + i + ']');
  }
  const uSpeed     = gl.getUniformLocation(prog, 'uSpeed');
  const uRpm       = gl.getUniformLocation(prog, 'uRpm');
  const uLatG      = gl.getUniformLocation(prog, 'uLatG');
  const uLongG     = gl.getUniformLocation(prog, 'uLongG');
  const uBrakeHeat = gl.getUniformLocation(prog, 'uBrakeHeat');
  const uYawRate   = gl.getUniformLocation(prog, 'uYawRate');
  const uSteer     = gl.getUniformLocation(prog, 'uSteer');
  const uAmbientColor = gl.getUniformLocation(prog, 'uAmbientColor');
  const uAmbientLum   = gl.getUniformLocation(prog, 'uAmbientLum');

  // ── Panel rect collection (mirrors webgl.js getAllPanelRectsUV) ──
  function getAllPanelRectsUV() {
    const panels = document.querySelectorAll('.panel');
    const rects = [];
    const alphas = [];
    const radii = [];
    const vw = window.innerWidth, vh = window.innerHeight;
    for (let i = 0; i < panels.length && rects.length < 16; i++) {
      const el = panels[i];
      if (el.offsetWidth === 0 || el.offsetHeight === 0) continue;
      const r = el.getBoundingClientRect();
      if (r.width < 2 || r.height < 2) continue;
      rects.push([r.left / vw, r.top / vh, r.width / vw, r.height / vh]);

      // Walk DOM for effective opacity
      let opacity = 1;
      let node = el;
      while (node && node !== document.body) {
        const o = parseFloat(getComputedStyle(node).opacity);
        if (o < 1) opacity *= o;
        node = node.parentElement;
      }
      alphas.push(opacity);

      // Get border-radius in UV space
      const style = getComputedStyle(el);
      const brPx = parseFloat(style.borderRadius) || 0;
      radii.push([brPx / vw, brPx / vh]);
    }
    return { rects, alphas, radii };
  }

  // ── Simulated telemetry (animate for visual test) ──
  let simTime = 0;

  // ── Main loop ──
  let lastTs = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;
    simTime += dt;

    // Draw game background
    drawGame(ts);

    // Simulated telemetry cycling
    const speed = 0.5 + 0.4 * Math.sin(simTime * 0.3);
    const rpm   = 0.7 + 0.28 * Math.sin(simTime * 0.5);
    const latG  = Math.sin(simTime * 0.8) * 1.2;
    const longG = Math.cos(simTime * 0.6) * 0.8;
    const brakeHeat = Math.max(0, Math.sin(simTime * 0.4)) * 0.6;
    const steer = Math.sin(simTime * 0.7) * 0.8;  // oscillates ±0.8

    // Read slider values
    const opSlider  = document.getElementById('opSlider');
    const lumSlider = document.getElementById('lumSlider');
    const opVal  = (opSlider ? opSlider.value : 50) / 100;
    const lumVal = (lumSlider ? lumSlider.value : 60) / 100;

    const ambR = BLUE.r, ambG = BLUE.g, ambB = BLUE.b;
    const ambLum = BLUE_LUM * lumVal * 2.0; // scale by slider

    // Resize canvas
    const w = window.innerWidth, h = window.innerHeight;
    const dpr = Math.max((window.devicePixelRatio || 1) * 0.5, 1);
    const cw = Math.round(w * dpr), ch = Math.round(h * dpr);
    if (glareCanvas.width !== cw || glareCanvas.height !== ch) {
      glareCanvas.width = cw;
      glareCanvas.height = ch;
      gl.viewport(0, 0, cw, ch);
    }

    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    // Panel rects with rounded corners
    const { rects: panelRects, alphas: panelAlphas, radii: panelRadii } = getAllPanelRectsUV();

    gl.uniform1f(uTime, simTime);
    gl.uniform1i(uCount, 0); // No pedal glow sources in test

    // Panel mask uniforms
    gl.uniform1i(uPanelCount, panelRects.length);
    for (let i = 0; i < 16; i++) {
      if (i < panelRects.length) {
        gl.uniform4f(uPanelRect[i], panelRects[i][0], panelRects[i][1], panelRects[i][2], panelRects[i][3]);
        gl.uniform1f(uPanelAlpha[i], panelAlphas[i] * opVal);
        gl.uniform2f(uPanelRadius[i], panelRadii[i][0], panelRadii[i][1]);
      } else {
        gl.uniform4f(uPanelRect[i], 0, 0, 0, 0);
        gl.uniform1f(uPanelAlpha[i], 0.0);
        gl.uniform2f(uPanelRadius[i], 0, 0);
      }
    }

    // Glow source rects (empty — no pedals in test)
    for (let i = 0; i < 8; i++) {
      gl.uniform4f(uRect[i], 0, 0, 0, 0);
      gl.uniform4f(uColor[i], 0, 0, 0, 0);
    }

    // Telemetry
    gl.uniform1f(uSpeed, speed);
    gl.uniform1f(uRpm, rpm);
    gl.uniform1f(uLatG, latG);
    gl.uniform1f(uLongG, longG);
    gl.uniform1f(uBrakeHeat, brakeHeat);
    gl.uniform1f(uYawRate, 0.0);
    gl.uniform1f(uSteer, steer);

    // Ambient color
    gl.uniform3f(uAmbientColor, ambR, ambG, ambB);
    gl.uniform1f(uAmbientLum, ambLum);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // Status HUD
    const r8 = Math.round(ambR * 255), g8 = Math.round(ambG * 255), b8 = Math.round(ambB * 255);
    document.getElementById('swatchEl').style.background = `rgb(${r8},${g8},${b8})`;
    document.getElementById('rgbText').textContent = `RGB(${r8}, ${g8}, ${b8})`;
    document.getElementById('statusText').textContent =
      `Lum: ${(ambLum * 100).toFixed(0)}% | ` +
      `Opacity: ${(opVal * 100).toFixed(0)}% | ` +
      `Panels: ${panelRects.length} | ` +
      `SPD: ${(speed * 100).toFixed(0)} RPM: ${(rpm * 100).toFixed(0)}%`;
  }
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
