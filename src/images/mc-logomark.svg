<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" fill="none">
  <!--
    MC logomark — matching K10 chevron mark visual language:
    • Bold angular shapes with ~30° skew
    • Red gradient palette from bright to deep
    • Solid filled shapes, no outlines
    • Forward-motion energy
  -->

  <!-- ══════ M ══════ -->
  <!-- Built from four angular struts forming the M shape -->
  <!-- Left leg -->
  <polygon points="0,130 20,10 48,10 28,130" fill="#E53935"/>
  <!-- Left-center diagonal -->
  <polygon points="28,10 68,80 84,80 48,10" fill="#D32F2F"/>
  <!-- Right-center diagonal -->
  <polygon points="68,80 96,10 124,10 84,80" fill="#C62828"/>
  <!-- Right leg -->
  <polygon points="96,10 124,10 104,130 76,130" fill="#B71C1C"/>

  <!-- ══════ C ══════ -->
  <!-- Built from three angular struts forming an open bracket -->
  <!-- Top arm — skewed parallelogram pointing right -->
  <polygon points="170,10 300,10 288,38 182,38" fill="#E53935"/>
  <!-- Left spine — connects top to bottom with angular skew -->
  <polygon points="170,10 182,38 152,102 140,130" fill="#C62828"/>
  <!-- Bottom arm — skewed parallelogram pointing right -->
  <polygon points="140,130 152,102 288,102 300,130" fill="#8E2020"/>
</svg>
